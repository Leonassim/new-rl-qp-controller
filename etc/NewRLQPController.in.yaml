---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: false
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# Additional robots to load
robots:
  ground:
    module: env/ground

# Collision constraint
collisions:
- type: collision
  useMinimal: true

ObserverPipelines:
- name: Pipeline
  observers:
    # Add an encoder observer to read joint velocities (Required for closed loop control)
    - type: Encoder
      config:
          velocity: encoderVelocities

# Implement some additional text states
states: {}
# Transitions map
transitions:
- [NewRLQPController_Initial, OK, NewRLQPController_Initial, Strict]
# Initial state
init: NewRLQPController_Initial

# RL policy configuration parameters
policy_path: ["policyName1.onnx", "policyName2.onnx"]  # Path to the RL policy file(s) 
default_policy_index: 0 # Index of the default policy to use
policies:
  # index 0 : policyName1
  - is_torque_control: true
    use_QP: true
    action_scale: 1.0
    policy_step_size: 0.01 # Policy step size in seconds
    physics_step_size: 0.001 # Physics step size in seconds
    pd_gains_ratio: 1.0
    kp:
        joint_name1: gain value e.g 100.0
        joint_name2: gain value e.g 100.0
        ...
        joint_nameN: gain value e.g 100.0
    kd:
        joint_name1: gain value e.g 100.0
        joint_name2: gain value e.g 100.0
        ...
        joint_nameN: gain value e.g 100.0
    q0:
      joint_name1: joint pos value in rad e.g 0.0
      joint_name2: joint pos value in rad e.g 0.0
      ...
      joint_nameN: joint pos value in rad e.g 0.0
  # index 1 : policyName2
  - is_torque_control: true
    use_QP: true
    action_scale: 1.0
    policy_step_size: 0.01 # Policy step size in seconds
    physics_step_size: 0.001 # Physics step size in seconds
    pd_gains_ratio: 1.0
    kp:
        joint_name1: gain value e.g 100.0
        joint_name2: gain value e.g 100.0
        ...
        joint_nameN: gain value e.g 100.0
    kd:
        joint_name1: gain value e.g 100.0
        joint_name2: gain value e.g 100.0
        ...
        joint_nameN: gain value e.g 100.0
    q0:
        joint_name1: joint pos value in rad e.g 0.0
        joint_name2: joint pos value in rad e.g 0.0
        ...
        joint_nameN: joint pos value in rad e.g 0.0
