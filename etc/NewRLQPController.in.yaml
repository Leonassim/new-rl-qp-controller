  "@RL_POLICY_INSTALL_PREFIX@/rhps1_velocity_v3_2026-07-10.onnx",
  # 2026-07-19_13-07-05 (finished, x5 leg scale): fallback config + mirror
  # loss + straight knees + anti-oscillation curriculum. Machine-local test
  # entry.
  "/home/lmoussafir/mjlab-rhps1/logs/rsl_rl/rhps1_velocity/2026-07-19_13-07-05/2026-07-19_13-07-05.onnx",
  # 2026-07-20_08-37-35 (finished, x6 leg scale): best run to date -- lowest
  # pd_demand ratio ever (0.31 final) *and* better amplitude than every
  # prior run (foot speed 0.276-0.279 m/s final). Machine-local test entry.
  "/home/lmoussafir/mjlab-rhps1/logs/rsl_rl/rhps1_velocity/2026-07-20_08-37-35/2026-07-20_08-37-35.onnx",
]
