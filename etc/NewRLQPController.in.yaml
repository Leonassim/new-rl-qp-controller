---
Managed: false
StepByStep: true
IdleKeepState: false
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
VerboseStateFactory: false

robots:
  ground:
    module: env/ground

collisions:
- type: collision
  useMinimal: true

ObserverPipelines:
- name: Pipeline
  observers:
    - type: Encoder
      velocity: encoderVelocities
    - type: BodySensor
      update: true
      gui: true
      bodySensor: FloatingBase

states: {}
transitions:
- [NewRLQPController_Initial, OK, NewRLQPController_Initial, Strict]
init: NewRLQPController_Initial

policy_path: ["/path/to/rhps1_velocity_policy.onnx"]  # Update after installation
default_policy_index: 0

policies:
  # index 0 : RHPS1 velocity policy
  - use_QP: true
    policy_step_size: 0.005   # 200 Hz (5 ms)
    physics_step_size: 0.004  # mc_mujoco at 250 Hz (4 ms)
    pd_gains_ratio: 1.0

    action_scale:
      CHEST_Y:      0.005
      CHEST_P:      0.005
      HEAD_Y:       0.005
      HEAD_P:       0.005
      L_SHOULDER_P: 0.005
